<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jacob Albano</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f4ef;
      --ink: #1c1a17;
      --muted: #9a9488;
      --border: #e2ddd5;
      --hover: #f0ece4;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* fade-in on load */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page {
      width: 100%;
      max-width: 520px;
      padding: 64px 28px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.7s ease both;
    }

    /* ── Logo ── */
    .logo {
      width: 220px;
      margin-bottom: 40px;
      animation: fadeUp 0.7s ease 0.05s both;
    }

    /* ── Photo ── */
    .photo-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 22px;
      animation: fadeUp 0.7s ease 0.1s both;
      flex-shrink: 0;
    }

    .photo-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* ── Name ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 38px;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 10px;
      animation: fadeUp 0.7s ease 0.15s both;
    }

    .tagline {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.7s ease 0.2s both;
    }

    /* ── Rule ── */
    hr {
      width: 40px;
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 40px;
      animation: fadeUp 0.7s ease 0.22s both;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      text-align: center;
      animation: fadeUp 0.7s ease 0.25s both;
    }

    /* ── Company cards ── */
    .companies {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 52px;
      animation: fadeUp 0.7s ease 0.3s both;
    }

    .company {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .company:hover {
      background: var(--hover);
      border-color: #ccc7bc;
      transform: translateY(-1px);
    }

    .company.no-link {
      cursor: default;
      opacity: 0.72;
    }

    .company.no-link:hover {
      background: #fff;
      border-color: var(--border);
      transform: none;
    }

    .company-logo {
      height: 28px;
      width: auto;
      max-width: 140px;
      object-fit: contain;
      object-position: left center;
    }

    .company-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .coming-soon {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .arrow {
      font-size: 14px;
      color: var(--muted);
      transition: color 0.15s, transform 0.15s;
    }

    .company:hover .arrow {
      color: var(--ink);
      transform: translate(2px, -2px);
    }

    /* ── Contact ── */
    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      animation: fadeUp 0.7s ease 0.35s both;
    }

    .contact-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-email {
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.02em;
    }

    .contact-email:hover {
      border-color: var(--ink);
    }

    @media (max-width: 420px) {
      h1 { font-size: 30px; }
      .logo { width: 180px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Logo -->
    <img class="logo" src="public/images/KokomoandCoLogo.png" alt="Kokomo & Co" />

    <!-- Photo -->
    <div class="photo-ring">
      <img src="public/images/face.jpeg" alt="Jacob Albano" />
    </div>

    <!-- Name + tagline -->
    <h1>Jacob Albano</h1>
    <p class="tagline">Founder &amp; Creative</p>

    <hr />

    <!-- Companies -->
    <p class="section-label">Projects &amp; Companies</p>

    <div class="companies">

      <a class="company" href="https://pipcasso.com" target="_blank" rel="noopener">
        <img class="company-logo" src="public/images/PipcassoLogo.png" alt="Pipcasso" />
        <div class="company-right">
          <span class="arrow">↗</span>
        </div>
      </a>

      <div class="company no-link">
        <img class="company-logo" src="public/images/GelatoLogo.png" alt="Gelato" />
        <div class="company-right">
          <span class="coming-soon">Coming soon</span>
        </div>
      </div>

      <div class="company no-link">
        <img class="company-logo" src="public/images/SeondDueLogo.png" alt="Second Due" />
        <div class="company-right">
          <span class="coming-soon">Coming soon</span>
        </div>
      </div>

    </div>

    <!-- Contact -->
    <div class="contact">
      <span class="contact-label">Contact</span>
      <a class="contact-email" href="mailto:jacob@kokomoandco.com">jacob@kokomoandco.com</a>
    </div>

  </div>
</body>
</html>
