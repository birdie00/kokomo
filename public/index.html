<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kokomo &amp; Co</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      padding: 0;
      background: #e8e8e8;
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
      text-align: center;
    }

    .logo {
      display: block;
      margin: 48px auto 32px;
      width: 200px;
    }

    .photo-band {
      width: 100%;
      background: #000;
      padding: 40px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .photo-band img {
      width: 390px;
      height: 390px;
      border-radius: 50%;
      overflow: hidden;
      object-fit: cover;
      object-position: center top;
    }

    .companies {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 100%;
      margin: 48px 0;
    }

    .company {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      border-right: 1px solid rgba(0,0,0,0.1);
      border-top: 1px solid rgba(0,0,0,0.1);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      text-decoration: none;
    }

    .company img {
      max-width: 85%;
      height: 80px;
      object-fit: contain;
    }

    .contact {
      text-align: center;
      padding: 48px 0 80px;
      font-size: 15px;
      color: #1a1a1a;
    }

    .contact a {
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <img class="logo" src="images/KokomoandCoLogo.png" alt="Kokomo & Co" />

  <div class="photo-band">
    <img src="images/face.jpeg" alt="" />
  </div>

  <div class="companies">
    <a class="company" href="https://pipcasso.com" target="_blank" rel="noopener">
      <img src="images/PipcassoLogo.png" alt="Pipcasso" />
    </a>
    <a class="company" href="#">
      <img src="images/GelatoLogo.png" alt="Gelato" />
    </a>
    <a class="company" href="#">
      <img src="images/SeondDueLogo.png" alt="Second Due" />
    </a>
  </div>

  <div class="contact">
    <a href="mailto:jacob@kokomoandco.com">jacob@kokomoandco.com</a>
  </div>

</body>
</html>
